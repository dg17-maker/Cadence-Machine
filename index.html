<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDR Cadence Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-base: #0a0a0f;
    --bg-glass: rgba(255,255,255,0.04);
    --bg-glass-hover: rgba(255,255,255,0.08);
    --border-glass: rgba(255,255,255,0.1);
    --text-primary: #f0f2f5;
    --text-secondary: #a0a8b8;
    --text-muted: #6b7280;
    --holo-pink: #ff6bd6;
    --holo-purple: #b57bff;
    --holo-blue: #5eaaff;
    --holo-cyan: #4ae3e3;
    --holo-green: #4ade80;
    --holo-orange: #fb923c;
    --holo-red: #f87171;
    --holo-yellow: #facc15;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-base); color: var(--text-primary); min-height: 100vh; font-size: 14px; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 0% 0%, rgba(255,107,214,0.12) 0%, transparent 50%), radial-gradient(ellipse at 100% 100%, rgba(94,170,255,0.1) 0%, transparent 50%); pointer-events: none; z-index: 0; }
.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }
.sidebar { width: 220px; padding: 16px 10px; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border-glass); display: flex; flex-direction: column; gap: 4px; }
.brand { padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.brand-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--holo-pink), var(--holo-purple), var(--holo-blue)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px rgba(255,107,214,0.4); }
.brand-text { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, var(--holo-pink), var(--holo-purple), var(--holo-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chapter-box { margin: 0 6px 14px; padding: 10px 12px; background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
.chapter-box:hover { border-color: var(--holo-purple); box-shadow: 0 0 15px rgba(181,123,255,0.2); }
.chapter-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.chapter-value { font-size: 13px; font-weight: 600; color: var(--holo-purple); display: flex; align-items: center; gap: 6px; }
.nav-section { padding: 14px 12px 6px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
.nav-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); transition: all 0.15s; border: 1px solid transparent; }
.nav-item:hover { background: var(--bg-glass-hover); color: var(--text-primary); }
.nav-item.active { background: linear-gradient(135deg, rgba(255,107,214,0.15), rgba(181,123,255,0.15)); color: var(--text-primary); border: 1px solid rgba(255,107,214,0.3); }
.nav-icon { font-size: 15px; width: 22px; text-align: center; }
.nav-text { flex: 1; font-weight: 500; font-size: 12px; }
.nav-badge { background: linear-gradient(135deg, var(--holo-red), var(--holo-orange)); color: white; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.nav-badge.green { background: linear-gradient(135deg, var(--holo-green), var(--holo-cyan)); }
.main { flex: 1; padding: 24px; overflow-y: auto; max-height: 100vh; }
.card { background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 14px; padding: 18px; margin-bottom: 14px; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--holo-pink), var(--holo-purple), transparent); opacity: 0.5; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.section-title { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--holo-pink), var(--holo-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 18px; }
.stat-card { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 12px; padding: 14px; position: relative; overflow: hidden; }
.stat-card::before { content:''; position: absolute; top:0; left:0; right:0; height: 2px; background: linear-gradient(90deg, var(--stat-color, var(--holo-blue)), transparent); }
.stat-card.pink { --stat-color: var(--holo-pink); } .stat-card.purple { --stat-color: var(--holo-purple); } .stat-card.cyan { --stat-color: var(--holo-cyan); } .stat-card.green { --stat-color: var(--holo-green); } .stat-card.orange { --stat-color: var(--holo-orange); } .stat-card.red { --stat-color: var(--holo-red); }
.stat-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; background: linear-gradient(135deg, var(--stat-color, var(--holo-blue)), var(--text-primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn { padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: linear-gradient(135deg, var(--holo-pink), var(--holo-purple)); color: white; box-shadow: 0 0 20px rgba(255,107,214,0.3); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 25px rgba(255,107,214,0.4); }
.btn-secondary { background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-primary); }
.btn-success { background: linear-gradient(135deg, var(--holo-green), var(--holo-cyan)); color: #000; }
.btn-danger { background: linear-gradient(135deg, var(--holo-red), var(--holo-orange)); color: white; }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-glass); color: var(--text-primary); }
.btn-sm { padding: 6px 10px; font-size: 11px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 10px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary); font-size: 13px; font-family: inherit; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--holo-purple); box-shadow: 0 0 15px rgba(181,123,255,0.2); }
.form-textarea { min-height: 80px; resize: vertical; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar .form-select { width: auto; min-width: 120px; padding: 8px 12px; font-size: 12px; }
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 500; }
.tag-pink { background: rgba(255,107,214,0.15); color: var(--holo-pink); }
.tag-purple { background: rgba(181,123,255,0.15); color: var(--holo-purple); }
.tag-blue { background: rgba(94,170,255,0.15); color: var(--holo-blue); }
.tag-cyan { background: rgba(74,227,227,0.15); color: var(--holo-cyan); }
.tag-green { background: rgba(74,222,128,0.15); color: var(--holo-green); }
.tag-orange { background: rgba(251,146,60,0.15); color: var(--holo-orange); }
.tag-red { background: rgba(248,113,113,0.15); color: var(--holo-red); }
.tag-gray { background: rgba(100,116,139,0.15); color: #94a3b8; }
.priority { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 8px; font-size: 11px; font-weight: 700; }
.priority-1 { background: linear-gradient(135deg, var(--holo-red), var(--holo-orange)); color: white; }
.priority-2 { background: linear-gradient(135deg, var(--holo-orange), var(--holo-yellow)); color: white; }
.priority-3 { background: rgba(100,116,139,0.3); color: var(--text-secondary); }
.status { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 500; }
.status-new { background: rgba(94,170,255,0.15); color: var(--holo-blue); }
.status-inprogress { background: rgba(181,123,255,0.15); color: var(--holo-purple); }
.status-meeting { background: rgba(74,222,128,0.15); color: var(--holo-green); }
.status-paused { background: rgba(100,116,139,0.2); color: #94a3b8; }
.status-call { background: rgba(94,170,255,0.15); color: var(--holo-blue); }
.status-email { background: rgba(74,222,128,0.15); color: var(--holo-green); }
.status-linkedin { background: rgba(181,123,255,0.15); color: var(--holo-purple); }
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-glass); }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border-glass); }
th { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); background: rgba(0,0,0,0.2); }
tr:hover td { background: var(--bg-glass-hover); }
tr[data-contact], tr[data-account] { cursor: pointer; }
.queue-item { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
.queue-item:hover { border-color: var(--holo-purple); transform: translateX(4px); }
.queue-item.overdue { border-left: 3px solid var(--holo-red); background: rgba(248,113,113,0.05); }
.queue-item.today { border-left: 3px solid var(--holo-orange); }
.queue-info { flex: 1; min-width: 0; }
.queue-name { font-weight: 600; margin-bottom: 2px; }
.queue-meta { font-size: 11px; color: var(--text-muted); }
.queue-action { text-align: right; }
.queue-due { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
/* AE Card Grid */
.ae-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.ae-card { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 14px; padding: 16px; max-height: 400px; display: flex; flex-direction: column; }
.ae-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-glass); }
.ae-name { font-size: 16px; font-weight: 600; color: var(--holo-cyan); }
.ae-stats { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); }
.ae-scroll { flex: 1; overflow-y: auto; }
.ae-scroll::-webkit-scrollbar { width: 4px; }
.ae-scroll::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 2px; }
.ae-account-row { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
.ae-account-row:hover { background: var(--bg-glass-hover); }
/* Calendar improvements */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.cal-nav { display: flex; align-items: center; gap: 12px; }
.cal-nav-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-primary); cursor: pointer; }
.cal-nav-btn:hover { background: var(--bg-glass-hover); border-color: var(--holo-purple); }
.cal-title { font-size: 18px; font-weight: 600; min-width: 180px; text-align: center; }
.cal-modes { display: flex; gap: 4px; background: var(--bg-glass); border-radius: 8px; padding: 4px; }
.cal-mode { padding: 6px 14px; border-radius: 6px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 12px; }
.cal-mode.active { background: linear-gradient(135deg, var(--holo-pink), var(--holo-purple)); color: white; }
.cal-month { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-weekday { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-muted); padding: 8px 4px; }
.cal-day { min-height: 80px; background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 8px; padding: 6px; cursor: pointer; transition: all 0.2s; }
.cal-day:hover { border-color: var(--holo-purple); }
.cal-day.other-month { opacity: 0.4; }
.cal-day.today { border-color: var(--holo-cyan); box-shadow: 0 0 15px rgba(74,227,227,0.2); }
.cal-day-num { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.cal-day-tasks { display: flex; flex-direction: column; gap: 2px; overflow: hidden; max-height: 50px; }
.cal-task { font-size: 9px; padding: 2px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: rgba(94,170,255,0.2); color: var(--holo-blue); }
.cal-task-more { font-size: 9px; color: var(--text-muted); }
/* Meeting card */
.meeting-card { background: linear-gradient(135deg, rgba(74,222,128,0.1), rgba(74,227,227,0.1)); border: 1px solid rgba(74,222,128,0.3); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.meeting-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.meeting-contact { font-size: 16px; font-weight: 600; color: var(--holo-green); }
.meeting-account { font-size: 12px; color: var(--text-secondary); }
.meeting-date { font-size: 11px; color: var(--holo-cyan); }
.meeting-notes { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; font-size: 12px; margin-top: 10px; }
/* Notes timeline */
.notes-timeline { max-height: 300px; overflow-y: auto; }
.note-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-glass); }
.note-item:last-child { border-bottom: none; }
.note-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; background: var(--bg-glass); }
.note-content { flex: 1; }
.note-meta { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.note-text { font-size: 12px; line-height: 1.4; }
/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: var(--bg-base); border: 1px solid var(--border-glass); border-radius: 16px; padding: 20px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-lg { max-width: 700px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 18px; font-weight: 600; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg-glass); color: var(--text-secondary); cursor: pointer; }
.modal-close:hover { background: var(--holo-red); color: white; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-glass); }
/* POV */
.pov-section { margin-bottom: 12px; }
.pov-section-title { font-size: 11px; font-weight: 600; color: var(--holo-purple); text-transform: uppercase; margin-bottom: 4px; }
.pov-content { background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 8px; padding: 10px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
.pov-score { display: inline-flex; padding: 2px 8px; background: linear-gradient(135deg, var(--holo-orange), var(--holo-yellow)); color: #000; border-radius: 10px; font-size: 11px; font-weight: 700; }
/* Cadence */
.cadence-line { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; padding: 6px 0; }
.cadence-dot { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; border: 2px solid; }
.cadence-dot.call { background: rgba(94,170,255,0.15); color: var(--holo-blue); border-color: var(--holo-blue); }
.cadence-dot.email { background: rgba(74,222,128,0.15); color: var(--holo-green); border-color: var(--holo-green); }
.cadence-dot.linkedin { background: rgba(181,123,255,0.15); color: var(--holo-purple); border-color: var(--holo-purple); }
.cadence-dot.done { opacity: 0.35; }
.cadence-dot.skipped { opacity: 0.25; }
.cadence-dot.current { transform: scale(1.2); box-shadow: 0 0 15px currentColor; }
.cadence-conn { width: 8px; height: 2px; background: var(--border-glass); }
/* Play cards */
.play-card { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 12px; padding: 14px; border-left: 4px solid var(--holo-pink); }
.play-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.play-name { font-weight: 600; display: flex; align-items: center; gap: 6px; }
.play-stats { display: flex; gap: 16px; }
.play-stat { text-align: center; }
.play-stat-val { font-size: 22px; font-weight: 700; }
.play-stat-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
/* Links */
.link-row { display: flex; gap: 6px; align-items: center; }
.link-row input { flex: 1; }
.link-btn { padding: 9px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; font-weight: 500; }
.link-btn-ln { background: rgba(181,123,255,0.15); color: var(--holo-purple); border: 1px solid rgba(181,123,255,0.3); }
.link-btn-ln:hover { background: var(--holo-purple); color: white; }
.link-btn-org { background: rgba(94,170,255,0.15); color: var(--holo-blue); border: 1px solid rgba(94,170,255,0.3); }
.link-btn-org:hover { background: var(--holo-blue); color: white; }
/* Activity */
.activity-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-glass); position: relative; }
.activity-item:hover .activity-delete { opacity: 1; }
.activity-delete { position: absolute; top: 10px; right: 0; opacity: 0; background: var(--holo-red); color: white; border: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 10px; }
.activity-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.activity-icon.call { background: rgba(94,170,255,0.15); color: var(--holo-blue); }
.activity-icon.email { background: rgba(74,222,128,0.15); color: var(--holo-green); }
.activity-icon.linkedin { background: rgba(181,123,255,0.15); color: var(--holo-purple); }
.activity-content { flex: 1; }
.activity-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; flex-wrap: wrap; gap: 4px; }
.activity-type { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 6px; }
.activity-time { font-size: 10px; color: var(--text-muted); }
.activity-note { font-size: 11px; color: var(--text-secondary); }
/* Detail nav */
.detail-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.detail-nav-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-primary); cursor: pointer; }
.detail-nav-btn:hover { background: var(--bg-glass-hover); border-color: var(--holo-purple); }
.detail-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
/* Settings */
.settings-section { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.settings-row { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 6px; }
.settings-row label { flex: 1; }
/* Grids */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 1100px) { .grid-2, .grid-3, .ae-grid { grid-template-columns: 1fr; } }
.chart-wrap { position: relative; height: 200px; }
.flex { display: flex; } .flex-wrap { flex-wrap: wrap; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
.mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.text-muted { color: var(--text-muted); } .text-danger { color: var(--holo-red); }
.hidden { display: none !important; }
.skip-date { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: rgba(248,113,113,0.15); color: var(--holo-red); border-radius: 6px; font-size: 11px; }
.skip-date button { background: none; border: none; color: var(--holo-red); cursor: pointer; font-size: 10px; padding: 0; margin-left: 4px; }
.checkbox-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--holo-purple); }
    </style>
</head>
<body>

    contacts: JSON.parse(localStorage.getItem('bdr3_contacts')) || [],
    activities: JSON.parse(localStorage.getItem('bdr3_activities')) || [],
    plays: JSON.parse(localStorage.getItem('bdr3_plays')) || DEF_PLAYS,
    chapter: localStorage.getItem('bdr3_chapter') || getMonthId()

// Migrate contacts
S.contacts.forEach(c => {

    if (!c.plays) c.plays = [];
    if (!c.plays.includes(MAIN_PLAY_ID)) c.plays.push(MAIN_PLAY_ID);

        c.status = 'In Progress';
    }
    // Migrate old POV object to single notes field
    if (c.pov && typeof c.pov === 'object' && !c.notes) {
        const parts = [];
        if (c.pov.careAbout) parts.push('KEY PRIORITIES:\n' + c.pov.careAbout);
        if (c.pov.talkTrack) parts.push('TALK TRACK:\n' + c.pov.talkTrack);
        if (c.pov.email) parts.push('EMAIL:\n' + c.pov.email);
        if (c.pov.notes) parts.push('NOTES:\n' + c.pov.notes);
        if (parts.length) c.notes = parts.join('\n\n---\n\n');
        delete c.pov;
    }
});
save('contacts');

function save(k) { localStorage.setItem('bdr3_' + k, JSON.stringify(S[k])); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function getAccount(id) { return S.accounts.find(a => a.id === id); }
function getContact(id) { return S.contacts.find(c => c.id === id); }
function getPlay(id) { return S.plays.find(p => p.id === id); }
function getTag(id) { return S.settings.tags.find(t => t.id === id); }
function getMonthId() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function getMonthName(id) { 
    if (id === 'all') return 'All Time';
    const [y,m] = id.split('-'); 
    return new Date(y, m-1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); 
}
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '-'; }
function fmtDateTime(d) { return d ? new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '-'; }
function fmtDateFull(d) { return d ? new Date(d).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '-'; }
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function daysDiff(a, b) { return Math.floor((new Date(b) - new Date(a)) / 864e5); }
function sameDay(a, b) { return a.toDateString() === b.toDateString(); }
function escHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') : ''; }
function toDateStr(d) { return d.toISOString().split('T')[0]; }

// Working days logic
function isWorkingDay(date) {
    const dow = date.getDay();
    if (S.settings.skipWeekends && (dow === 0 || dow === 6)) return false;
    const ds = toDateStr(date);
    if (S.settings.skipDates.includes(ds)) return false;
    return true;
}

function getNextWorkingDay(date) {
    let d = new Date(date);
    while (!isWorkingDay(d)) d = addDays(d, 1);
    return d;
}

function addWorkingDays(date, n) {
    let d = new Date(date), added = 0;
    while (added < n) { d = addDays(d, 1); if (isWorkingDay(d)) added++; }
    return d;
}

// ========== CADENCE LOGIC ==========
function getCadence(acct) { return acct?.cadence || S.settings.cadence; }

function getNextStepIndex(c) {
    const a = getAccount(c.accountId);
    if (!a || !c.cadenceStart || ['Meeting','Closed','DQ'].includes(c.status)) return -1;
    const cad = getCadence(a);
    const ss = c.stepStatus || [];
    for (let i = 0; i < cad.steps.length; i++) { if (!ss[i]) return i; }
    return -1;
}

function getNextStep(c) { 
    const idx = getNextStepIndex(c); 
    if (idx < 0) return null; 
    return getCadence(getAccount(c.accountId)).steps[idx]; 
}

function getDueDate(c) {
    const idx = getNextStepIndex(c);
    if (idx < 0 || !c.cadenceStart) return null;
    const step = getCadence(getAccount(c.accountId)).steps[idx];
    return addDays(new Date(c.cadenceStart), step.d - 1);
}

function markStepDone(c, idx) {
    if (!c.stepStatus) c.stepStatus = [];
    c.stepStatus[idx] = 'done';
    const cad = getCadence(getAccount(c.accountId));
    if (c.stepStatus.filter(s => s).length >= cad.steps.length) c.status = 'Cycle Done';
    save('contacts');
}

function markStepSkipped(c, idx) {
    if (!c.stepStatus) c.stepStatus = [];
    c.stepStatus[idx] = 'skipped';
    const cad = getCadence(getAccount(c.accountId));
    if (c.stepStatus.filter(s => s).length >= cad.steps.length) c.status = 'Cycle Done';
    save('contacts');
}

function skipStep(id) { 
    const c = getContact(id); 
    if (!c) return; 
    const idx = getNextStepIndex(c); 
    if (idx >= 0) markStepSkipped(c, idx); 
    render(); 
}

function startCadence(id, startDate) { 
    const c = getContact(id); 
    if (c) { 
        c.cadenceStart = (startDate || new Date()).toISOString(); 
        c.stepStatus = []; 
        c.status = 'In Progress'; 
        if (!c.plays) c.plays = [];
        if (!c.plays.includes(MAIN_PLAY_ID)) c.plays.push(MAIN_PLAY_ID);
        save('contacts'); 
    } 
}

function restartCadence(id) { startCadence(id, new Date()); render(); }
function setStatus(id, st) { const c = getContact(id); if (c) { c.status = st; save('contacts'); render(); } }

function getTasks() {
    const t = today(), tasks = [];
    S.contacts.forEach(c => {
        if (['Meeting','Closed','DQ','Paused'].includes(c.status)) return;
        const step = getNextStep(c);
        if (!step) return;
        const due = getDueDate(c);
        if (!due) return;
        const a = getAccount(c.accountId);
        const over = due < t, dueToday = sameDay(due, t);
        if (over || dueToday) tasks.push({ c, a, step, stepIdx: getNextStepIndex(c), due, over, daysOver: Math.max(0, daysDiff(due, t)) });
    });
    return tasks.sort((a,b) => {
        if (a.over !== b.over) return a.over ? -1 : 1;
        if (a.daysOver !== b.daysOver) return b.daysOver - a.daysOver;
        return (a.a?.priority||3) - (b.a?.priority||3);
    });
}

function getTasksForDate(date) {
    const tasks = [];
    S.contacts.forEach(c => {
        if (['Meeting','Closed','DQ','Paused'].includes(c.status)) return;
        const step = getNextStep(c);
        if (!step) return;
        const due = getDueDate(c);
        if (due && sameDay(due, date)) {
            tasks.push({ c, a: getAccount(c.accountId), step, stepIdx: getNextStepIndex(c), due });
        }
    });
    return tasks;
}

// Group tasks by account for calendar
function getAccountTasksForDate(date) {
    const tasks = getTasksForDate(date);
    const byAcct = {};
    tasks.forEach(t => {
        const aid = t.a?.id || 'none';
        if (!byAcct[aid]) byAcct[aid] = { account: t.a, contacts: [] };
        byAcct[aid].contacts.push(t.c);
    });
    return Object.values(byAcct);
}

// ========== SMART SCHEDULE ==========
function smartSchedule(days = 14) {
    const t = today();
    const target = S.settings.dailyTarget || 25;
    const unscheduled = S.contacts.filter(c => 
        !['Meeting','Closed','DQ','Paused'].includes(c.status) && 
        !c.cadenceStart
    );
    
    // Sort by account priority
    unscheduled.sort((a, b) => {
        const ap = getAccount(a.accountId)?.priority || 3;
        const bp = getAccount(b.accountId)?.priority || 3;
        return ap - bp;
    });
    
    let dayIdx = 0;
    unscheduled.forEach((c, i) => {
        const startDate = addDays(t, dayIdx);
        c.cadenceStart = startDate.toISOString();
        c.stepStatus = [];
        c.status = 'In Progress';
        if (!c.plays) c.plays = [];
        if (!c.plays.includes(MAIN_PLAY_ID)) c.plays.push(MAIN_PLAY_ID);
        
        if ((i + 1) % target === 0) dayIdx++;
        if (dayIdx >= days) dayIdx = 0; // Wrap around
    });
    
    save('contacts');
    render();
    alert(`Scheduled ${unscheduled.length} contacts across ${days} days (~${target}/day)`);
}

// Reschedule overdue to spread across next N working days
function rescheduleOverdue(days = 7) {
    const t = today();
    const target = S.settings.dailyTarget || 25;
    const overdue = S.contacts.filter(c => {
        if (['Meeting','Closed','DQ','Paused'].includes(c.status)) return false;
        const due = getDueDate(c);
        return due && due < t;
    });
    
    overdue.sort((a, b) => {
        const ap = getAccount(a.accountId)?.priority || 3;
        const bp = getAccount(b.accountId)?.priority || 3;
        return ap - bp;
    });
    
    // Build array of working days
    const workDays = [];
    let d = getNextWorkingDay(t);
    while (workDays.length < days) {
        if (isWorkingDay(d)) workDays.push(new Date(d));
        d = addDays(d, 1);
    }
    
    let dayIdx = 0, perDay = 0;
    overdue.forEach(c => {
        c.cadenceStart = workDays[dayIdx].toISOString();
        perDay++;
        if (perDay >= target) { perDay = 0; dayIdx++; if (dayIdx >= workDays.length) dayIdx = 0; }
    });
    
    save('contacts');
    render();
    alert(`Rescheduled ${overdue.length} contacts across ${workDays.length} working days (~${target}/day)`);
}

// ========== FILTERING ==========
function getFilteredActivities() {
    if (S.chapter === 'all') return S.activities;
    return S.activities.filter(a => a.ts?.startsWith(S.chapter));
}

function getContactActivities(cid) {
    return getFilteredActivities().filter(a => a.contactId === cid);
}

function getAccountActivities(aid) {
    return getFilteredActivities().filter(a => {
        const c = getContact(a.contactId);
        return c && c.accountId === aid;
    });
}

function deleteActivity(actId) { 
    if (!confirm('Delete?')) return; 
    S.activities = S.activities.filter(a => a.id !== actId); 
    save('activities'); 
    render(); 
}

function getPlayStats(pid) {
    const acts = getFilteredActivities();
    const todayStr = today().toISOString().split('T')[0];
    let todayCt = 0, totalCt = 0, active = 0;
    acts.forEach(a => { 
        if (a.playId === pid || (pid === MAIN_PLAY_ID)) { 
            totalCt++; 
            if (a.ts?.split('T')[0] === todayStr) todayCt++; 
        } 
    });
    S.contacts.forEach(c => { if (c.plays?.includes(pid)) active++; });
    return { todayCt, totalCt, active };
}

function addToPlay(cid, pid) {
    const c = getContact(cid);
    if (!c) return;
    if (!c.plays) c.plays = [];
    if (!c.plays.includes(pid)) c.plays.push(pid);
    if (!c.plays.includes(MAIN_PLAY_ID)) c.plays.push(MAIN_PLAY_ID);
    save('contacts');
}

function addAccountToPlay(aid, pid) {
    const cts = S.contacts.filter(c => c.accountId === aid);
    cts.forEach(c => {
        if (!c.plays) c.plays = [];
        if (!c.plays.includes(pid)) c.plays.push(pid);
    });
    save('contacts');
    render();
}

// ========== MEETINGS ==========
function getMeetings() {
    return S.activities.filter(a => a.outcome === 'Meeting Booked').sort((a,b) => new Date(b.ts) - new Date(a.ts));
}

function getMeetingContacts() {
    return S.contacts.filter(c => c.status === 'Meeting');
}

let snWin = null, orgWin = null;
function openPanel(url) {
    const isLN = url.includes('linkedin');
    const sw = screen.width, sh = screen.height, qw = Math.floor(sw / 4);
    if (isLN) {
        const left = sw - qw;
        if (snWin && !snWin.closed) { snWin.location.href = url; snWin.focus(); }
        else snWin = window.open(url, 'sn', `width=${qw},height=${sh},left=${left},top=0`);
    } else {
        const left = Math.floor(sw / 2);
        if (orgWin && !orgWin.closed) { orgWin.location.href = url; orgWin.focus(); }
        else orgWin = window.open(url, 'org', `width=${qw},height=${sh},left=${left},top=0`);
    }
}
function searchSN(name, co) { openPanel(`https://www.linkedin.com/sales/search/people?query=(keywords%3A${encodeURIComponent(name+' '+co)})`); }
function searchOrg(name) { openPanel(`https://org62.lightning.force.com/lightning/o/Contact/list?filterName=Recent&q=${encodeURIComponent(name)}`); }

function render() {
    const m = document.getElementById('main');
    updateBadges();
    if (detailType === 'contact') { m.innerHTML = renderContactDetail(); attachEvents(); return; }
    if (detailType === 'account') { m.innerHTML = renderAccountDetail(); attachEvents(); return; }
    switch (view) {
        case 'queue': m.innerHTML = renderQueue(); break;
        case 'planner': m.innerHTML = renderPlanner(); break;
        case 'plays': m.innerHTML = renderPlays(); break;
        case 'accounts': m.innerHTML = renderAccounts(); break;
        case 'contacts': m.innerHTML = renderContacts(); break;
        case 'dashboard': m.innerHTML = renderDashboard(); break;
        case 'meetings': m.innerHTML = renderMeetings(); break;
        case 'import': m.innerHTML = renderImport(); break;
        case 'settings': m.innerHTML = renderSettings(); break;
    }
    attachEvents();
    if (view === 'dashboard') setTimeout(renderCharts, 50);
}

function attachEvents() {

        b.onclick = e => { e.stopPropagation(); showLogModal(b.dataset.log, b.dataset.type, parseInt(b.dataset.stepidx)); };

    document.querySelectorAll('[data-skip]').forEach(b => {
        b.onclick = e => { e.stopPropagation(); skipStep(b.dataset.skip); };
    });
    document.querySelectorAll('[data-contact]').forEach(el => { 
        el.onclick = e => { e.stopPropagation(); showContact(el.dataset.contact); }; 
    });
    document.querySelectorAll('[data-account]').forEach(el => { 
        el.onclick = e => { e.stopPropagation(); showAccount(el.dataset.account); }; 
    });
    document.querySelectorAll('[data-delact]').forEach(b => { 
        b.onclick = e => { e.stopPropagation(); deleteActivity(b.dataset.delact); }; 
    });
}

// ========== QUEUE VIEW ==========
function renderQueue() {
    const tasks = getTasks();
    const overdue = tasks.filter(t => t.over);
    const overdueCount = overdue.length;
    const p1 = tasks.filter(t => !t.over && t.a?.priority === 1);
    const p2 = tasks.filter(t => !t.over && t.a?.priority === 2);
    const p3 = tasks.filter(t => !t.over && (!t.a?.priority || t.a.priority === 3));
    const mainPlay = getPlay(MAIN_PLAY_ID);
    const ms = mainPlay ? getPlayStats(MAIN_PLAY_ID) : { todayCt: 0, totalCt: 0, active: 0 };

    let h = `<div class="section-header"><h1 class="section-title">Today's Queue</h1>
        <div class="flex gap-2">
            ${overdueCount > 20 ? `<button class="btn btn-secondary btn-sm" onclick="showRescheduleModal()">🔄 Spread Overdue</button>` : ''}
            <span class="status status-new">${tasks.length} tasks</span>
            ${overdueCount ? `<span class="tag tag-red">${overdueCount} overdue</span>` : ''}
        </div></div>`;

    // Stats row
    h += `<div class="stats-grid" style="grid-template-columns:repeat(5,1fr)">
        <div class="stat-card pink"><div class="stat-label">Queue</div><div class="stat-value">${tasks.length}</div></div>
        <div class="stat-card red"><div class="stat-label">Overdue</div><div class="stat-value">${overdueCount}</div></div>
        <div class="stat-card green"><div class="stat-label">Today</div><div class="stat-value">${ms.todayCt}</div></div>
        <div class="stat-card purple"><div class="stat-label">Total (${getMonthName(S.chapter)})</div><div class="stat-value">${ms.totalCt}</div></div>
        <div class="stat-card cyan"><div class="stat-label">Active</div><div class="stat-value">${ms.active}</div></div>
    </div>`;

    if (overdueCount) h += `<div class="card mb-4" style="border-color:var(--holo-red)"><div class="card-header"><span class="card-title text-danger">🚨 Overdue (${overdueCount})</span></div>${queueItems(overdue.slice(0, 20))}${overdueCount > 20 ? `<p class="text-muted mt-2">+${overdueCount - 20} more</p>` : ''}</div>`;
    if (p1.length) h += `<div class="card mb-4"><div class="card-header"><span class="card-title">🔥 P1 (${p1.length})</span></div>${queueItems(p1)}</div>`;
    if (p2.length) h += `<div class="card mb-4"><div class="card-header"><span class="card-title">⚡ P2 (${p2.length})</span></div>${queueItems(p2)}</div>`;
    if (p3.length) h += `<div class="card mb-4"><div class="card-header"><span class="card-title">📌 P3 (${p3.length})</span></div>${queueItems(p3)}</div>`;
    if (!tasks.length) h += `<div class="card" style="text-align:center;padding:50px"><div style="font-size:40px;margin-bottom:12px">🎉</div><div>All caught up!</div></div>`;
    return h;
}

function queueItems(tasks) {
    let h = '';
    tasks.forEach(t => {
        const icon = t.step.t === 'Call' ? '📞' : t.step.t === 'Email' ? '✉️' : '💼';
        const plays = (t.c.plays || []).filter(p => p !== MAIN_PLAY_ID);
        h += `<div class="queue-item ${t.over ? 'overdue' : 'today'}" data-contact="${t.c.id}">
            <span class="priority priority-${t.a?.priority||3}">P${t.a?.priority||3}</span>
            <div class="queue-info"><div class="queue-name">${t.c.name}</div>
                <div class="queue-meta">${t.c.title||''} @ ${t.a?.name||'--'}${plays.map(p => { const pl = getPlay(p); return pl ? ` <span class="tag tag-pink">${pl.icon}</span>` : ''; }).join('')}</div></div>
            <div class="queue-action"><div class="flex gap-2 items-center">
                <span class="status status-${t.step.t.toLowerCase()}">${icon} ${t.step.t}</span>
                <button class="btn btn-sm btn-primary" data-log="${t.c.id}" data-type="${t.step.t}" data-stepidx="${t.stepIdx}">Log</button>
                <button class="btn btn-sm btn-ghost" data-skip="${t.c.id}">Skip</button></div>
                <div class="queue-due">${t.over ? `<span class="text-danger">${t.daysOver}d over</span>` : 'Due today'}</div></div></div>`;
    });
    return h;
}

// ========== CALENDAR (ACCOUNTS NOT CONTACTS) ==========
function renderPlanner() {
    let h = `<div class="section-header"><h1 class="section-title">Calendar</h1></div>`;
    h += `<div class="cal-header">
        <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calNav(-1)">◀</button>
            <span class="cal-title">${getCalTitle()}</span>
            <button class="cal-nav-btn" onclick="calNav(1)">▶</button>
            <button class="btn btn-sm btn-secondary" onclick="calToday()">Today</button>
        </div>
        <div class="cal-modes">
            <button class="cal-mode ${calMode==='month'?'active':''}" onclick="setCalMode('month')">Month</button>
            <button class="cal-mode ${calMode==='week'?'active':''}" onclick="setCalMode('week')">Week</button>
            <button class="cal-mode ${calMode==='day'?'active':''}" onclick="setCalMode('day')">Day</button>
        </div>
    </div>`;
    if (calMode === 'month') h += renderCalMonth();
    else if (calMode === 'week') h += renderCalWeek();
    else h += renderCalDay();
    return h;
}

function getCalTitle() {
    if (calMode === 'month') return calDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    if (calMode === 'week') {
        const start = getWeekStart(calDate), end = addDays(start, 6);
        return `${start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
    }
    return calDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function calNav(dir) {
    if (calMode === 'month') calDate.setMonth(calDate.getMonth() + dir);
    else if (calMode === 'week') calDate.setDate(calDate.getDate() + (dir * 7));
    else calDate.setDate(calDate.getDate() + dir);
    render();
}
function calToday() { calDate = new Date(); render(); }
function setCalMode(mode) { calMode = mode; render(); }
function getWeekStart(d) { const date = new Date(d); date.setDate(date.getDate() - date.getDay()); return date; }

function renderCalMonth() {
    const year = calDate.getFullYear(), month = calDate.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDay = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    const t = today();
    
    let h = `<div class="cal-month">`;
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => { h += `<div class="cal-weekday">${d}</div>`; });
    
    // Previous month days
    const prevMonth = new Date(year, month, 0);
    for (let i = startDay - 1; i >= 0; i--) {
        h += renderCalDayCell(new Date(year, month - 1, prevMonth.getDate() - i), true, t);
    }
    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
        h += renderCalDayCell(new Date(year, month, d), false, t);
    }
    // Next month days
    const totalCells = startDay + daysInMonth;
    const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remaining; i++) {
        h += renderCalDayCell(new Date(year, month + 1, i), true, t);
    }
    h += `</div>`;
    return h;
}

function renderCalDayCell(date, otherMonth, t) {
    const isToday = sameDay(date, t);
    const acctTasks = getAccountTasksForDate(date);
    const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
    
    let h = `<div class="cal-day ${otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}" onclick="selectCalDay(${y},${m},${d})">
        <div class="cal-day-num">${date.getDate()}</div><div class="cal-day-tasks">`;
    acctTasks.slice(0, 3).forEach(at => { 
        h += `<div class="cal-task">${at.account?.name || 'Unknown'} (${at.contacts.length})</div>`; 
    });
    if (acctTasks.length > 3) h += `<div class="cal-task-more">+${acctTasks.length - 3} more</div>`;
    h += `</div></div>`;
    return h;
}

function selectCalDay(y, m, d) { calDate = new Date(y, m - 1, d); calMode = 'day'; render(); }

function renderCalWeek() {
    const t = today(), start = getWeekStart(calDate);
    let h = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">`;
    for (let i = 0; i < 7; i++) {
        const date = addDays(start, i);
        const isToday = sameDay(date, t);
        const acctTasks = getAccountTasksForDate(date);
        h += `<div style="background:var(--bg-glass);border:1px solid ${isToday ? 'var(--holo-cyan)' : 'var(--border-glass)'};border-radius:10px;padding:10px;min-height:300px">
            <div style="text-align:center;padding-bottom:8px;border-bottom:1px solid var(--border-glass);margin-bottom:8px">
                <div style="font-size:10px;color:var(--text-muted)">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()]}</div>
                <div style="font-size:20px;font-weight:700;${isToday ? 'color:var(--holo-cyan)' : ''}">${date.getDate()}</div>
            </div>`;
        acctTasks.forEach(at => {
            h += `<div style="padding:6px;background:var(--bg-glass-hover);border-radius:6px;margin-bottom:4px;cursor:pointer;border-left:3px solid var(--holo-blue)" data-account="${at.account?.id}">
                <div style="font-size:11px;font-weight:500">${at.account?.name || '?'}</div>
                <div style="font-size:9px;color:var(--text-muted)">${at.contacts.length} contact${at.contacts.length !== 1 ? 's' : ''}</div>
            </div>`;
        });
        if (!acctTasks.length) h += `<p class="text-muted" style="font-size:11px;text-align:center">No tasks</p>`;
        h += `</div>`;
    }
    h += `</div>`;
    return h;
}

function renderCalDay() {
    const t = today();
    const isToday = sameDay(calDate, t);
    const acctTasks = getAccountTasksForDate(calDate);
    const totalContacts = acctTasks.reduce((sum, at) => sum + at.contacts.length, 0);
    
    let h = `<div class="card" style="text-align:center;padding:20px;margin-bottom:16px">
        <h2 style="font-size:24px;font-weight:700">${calDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</h2>
        <p class="text-muted">${acctTasks.length} accounts • ${totalContacts} contacts ${isToday ? '• Today' : ''}</p>
    </div>`;
    
    if (!acctTasks.length) {
        h += `<div class="card" style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:12px">📭</div><div class="text-muted">No tasks scheduled</div></div>`;
    } else {
        acctTasks.forEach(at => {
            h += `<div class="card" style="cursor:pointer" data-account="${at.account?.id}">
                <div class="card-header"><span class="card-title" style="font-size:14px">${at.account?.name || 'Unknown'}</span>
                    <span class="priority priority-${at.account?.priority || 3}">P${at.account?.priority || 3}</span></div>
                <div style="display:flex;flex-wrap:wrap;gap:8px">`;
            at.contacts.forEach(c => {
                const step = getNextStep(c);
                const icon = step?.t === 'Call' ? '📞' : step?.t === 'Email' ? '✉️' : '💼';
                h += `<div style="background:var(--bg-glass-hover);padding:6px 10px;border-radius:6px;cursor:pointer" data-contact="${c.id}">
                    <span style="font-size:12px">${icon} ${c.name}</span></div>`;
            });
            h += `</div></div>`;
        });
    }
    return h;
}

function updateContact(id, field, val) { const c = getContact(id); if (c) { c[field] = val; save('contacts'); } }
function updateAccount(id, field, val) { const a = getAccount(id); if (a) { a[field] = val; save('accounts'); } }

function renderCharts() {
    const t = today();
    let numDays = dashRange === '7days' ? 7 : dashRange === 'month' ? 30 : 60;
    const days = [], labels = [];
    for (let i = numDays - 1; i >= 0; i--) {
        const d = addDays(t, -i);
        const ds = d.toISOString().split('T')[0];
        labels.push(numDays <= 7 ? d.toLocaleDateString('en-US',{weekday:'short'}) : d.toLocaleDateString('en-US',{month:'short',day:'numeric'}));
        days.push({ ds, calls: 0, emails: 0, linkedin: 0 });
    }
    S.activities.forEach(a => {
        const ds = a.ts?.split('T')[0];
        const day = days.find(d => d.ds === ds);
        if (day) { 
            if (a.type === 'Call') day.calls++; 
            else if (a.type === 'Email') day.emails++; 
            else day.linkedin++; 
        }
    });
    
    const actCtx = document.getElementById('actChart');
    if (actCtx) {
        new Chart(actCtx, {
            type: 'bar',
            data: { labels, datasets: [
                { label: 'Calls', data: days.map(d => d.calls), backgroundColor: '#5eaaff' },
                { label: 'Emails', data: days.map(d => d.emails), backgroundColor: '#4ade80' },
                { label: 'LinkedIn', data: days.map(d => d.linkedin), backgroundColor: '#b57bff' }
            ]},
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }, plugins: { legend: { labels: { color: '#a0a8b8' } } } }
        });
    }

    const acts = getFilteredActivities();
    const breakdown = { Call: 0, Email: 0, LinkedIn: 0 };
    acts.forEach(a => { if (breakdown[a.type] !== undefined) breakdown[a.type]++; });
    
    const bdCtx = document.getElementById('breakdownChart');
    if (bdCtx) {
        new Chart(bdCtx, {
            type: 'doughnut',
            data: { labels: Object.keys(breakdown), datasets: [{ data: Object.values(breakdown), backgroundColor: ['#5eaaff','#4ade80','#b57bff'] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#a0a8b8' } } } }
        });
    }
}

function importAccounts(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const lines = e.target.result.split('\n').filter(l => l.trim());
        if (lines.length < 2) return alert('No data');
        const hdr = parseCSVLine(lines[0]).map(h => h.toLowerCase());
        let added = 0, updated = 0;
        for (let i = 1; i < lines.length; i++) {
            const vals = parseCSVLine(lines[i]);
            const obj = {};
            hdr.forEach((h, j) => obj[h] = vals[j] || '');
            if (!obj.name) continue;
            const existing = S.accounts.find(a => a.name.toLowerCase() === obj.name.toLowerCase());
            if (existing) {
                if (obj.ae) existing.ae = obj.ae;
                if (obj.priority) existing.priority = parseInt(obj.priority) || 3;
                if (obj.status) existing.status = obj.status;
                if (obj.industry) existing.industry = obj.industry;
                if (obj.notes) existing.notes = obj.notes;
                updated++;
            } else {
                S.accounts.push({ id: genId(), name: obj.name, ae: obj.ae || '', priority: parseInt(obj.priority) || 3, industry: obj.industry || '', status: obj.status || 'New', notes: obj.notes || '', tags: [] });
                added++;
            }
        }
        save('accounts'); render();
        alert(`Imported: ${added} added, ${updated} updated`);
    };
    reader.readAsText(file);
}

function parseCSVLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else current += char;
    }
    result.push(current.trim());
    return result;
}

function importContacts(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const lines = e.target.result.split('\n').filter(l => l.trim());
        if (lines.length < 2) return alert('No data');
        const hdr = parseCSVLine(lines[0]).map(h => h.toLowerCase());
        let added = 0, updated = 0, skipped = 0;
        for (let i = 1; i < lines.length; i++) {
            const vals = parseCSVLine(lines[i]);
            const obj = {};
            hdr.forEach((h, j) => obj[h] = vals[j] || '');
            if (!obj.name) continue;
            const acct = S.accounts.find(a => a.name.toLowerCase() === (obj.account||'').toLowerCase());
            if (!acct) { skipped++; continue; }
            const existing = S.contacts.find(c => c.name.toLowerCase() === obj.name.toLowerCase() && c.accountId === acct.id);
            if (existing) {
                if (obj.title) existing.title = obj.title;
                if (obj.linkedinurl) existing.linkedinUrl = obj.linkedinurl;
                if (obj.org62url) existing.org62Url = obj.org62url;
                updated++;
            } else {
                S.contacts.push({ 
                    id: genId(), accountId: acct.id, name: obj.name, title: obj.title || '', 
                    linkedinUrl: obj.linkedinurl || '', org62Url: obj.org62url || '', 
                    status: 'In Progress', tags: [], plays: [MAIN_PLAY_ID], stepStatus: [], 
                    cadenceStart: new Date().toISOString(), notes: '' 
                });
                added++;
            }
        }
        save('contacts'); render();
        alert(`Imported: ${added} added, ${updated} updated, ${skipped} skipped (no account)`);
    };
    reader.readAsText(file);
}

function exportData() {
    const data = { accounts: S.accounts, contacts: S.contacts, activities: S.activities, plays: S.plays, settings: S.settings };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `bdr-backup-${new Date().toISOString().split('T')[0]}.json`; a.click();
}

function importJSON(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            if (data.accounts) { S.accounts = data.accounts; save('accounts'); }
            if (data.contacts) { S.contacts = data.contacts; save('contacts'); }
            if (data.activities) { S.activities = data.activities; save('activities'); }
            if (data.plays) { S.plays = data.plays; save('plays'); }
            if (data.settings) { S.settings = data.settings; save('settings'); }
            render();
            alert('Imported!');
        } catch (err) { alert('Invalid JSON'); }
    };
    reader.readAsText(file);
}

    const plays = S.plays.filter(p => !p.isMain);
    document.getElementById('modalBox').innerHTML = `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><span class="modal-title">Log ${type}</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <p class="text-muted mb-3">${c.name}</p>
        <div class="form-group"><label class="form-label">Outcome</label><select class="form-select" id="logOutcome">${outcomes.map(o => `<option>${o}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Play (optional)</label><select class="form-select" id="logPlay"><option value="">Main Outreach only</option>${plays.map(p => `<option value="${p.id}">${p.icon} ${p.name}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="logNotes"></textarea></div>
        <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLog('${id}','${type}',${stepIdx})">Log</button></div>
    </div></div>`;
}

function saveLog(id, type, stepIdx) {
    const c = getContact(id);
    if (!c) return;
    const outcome = document.getElementById('logOutcome').value;
    const playId = document.getElementById('logPlay').value;
    const notes = document.getElementById('logNotes').value;
    
    S.activities.push({ id: genId(), contactId: id, type, outcome, notes, playId: MAIN_PLAY_ID, ts: new Date().toISOString() });
    if (playId && playId !== MAIN_PLAY_ID) {
        S.activities.push({ id: genId(), contactId: id, type, outcome, notes, playId, ts: new Date().toISOString() });
        addToPlay(id, playId);
    }
    save('activities');
    if (stepIdx >= 0) markStepDone(c, stepIdx);
    if (outcome === 'Meeting Booked') c.status = 'Meeting';
    save('contacts'); closeModal(); render();
}

// Tag Modal
function showTagModal(id, type) {
    const entity = type === 'contact' ? getContact(id) : getAccount(id);
    if (!entity) return;
    const current = entity.tags || [];
    document.getElementById('modalBox').innerHTML = `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><span class="modal-title">Manage Tags</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;padding:10px 0">${S.settings.tags.map(t => `<span class="tag tag-${t.color}" onclick="toggleTag('${id}','${type}','${t.id}')" style="cursor:pointer;${current.includes(t.id)?'box-shadow:0 0 10px currentColor':''}">${t.icon} ${t.name}</span>`).join('')}</div>
        <div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
    </div></div>`;
}

function toggleTag(id, type, tagId) {
    const entity = type === 'contact' ? getContact(id) : getAccount(id);
    if (!entity) return;
    if (!entity.tags) entity.tags = [];
    const idx = entity.tags.indexOf(tagId);
    if (idx >= 0) entity.tags.splice(idx, 1); else entity.tags.push(tagId);
    save(type === 'contact' ? 'contacts' : 'accounts');
    showTagModal(id, type);
}

// Play Modals
function showAddPlayModal(cid) {
    const plays = S.plays.filter(p => !p.isMain);
    document.getElementById('modalBox').innerHTML = `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><span class="modal-title">Add to Play</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">${plays.map(p => `<span class="tag tag-pink" onclick="addToPlay('${cid}','${p.id}');closeModal();render()" style="cursor:pointer;padding:8px 12px">${p.icon} ${p.name}</span>`).join('')}</div>
    </div></div>`;
}

function showAddAccountToPlayModal(aid) {
    const plays = S.plays.filter(p => !p.isMain);
    const cts = S.contacts.filter(c => c.accountId === aid);
    document.getElementById('modalBox').innerHTML = `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><span class="modal-title">Add Account to Play</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <p class="text-muted mb-3">This will add all ${cts.length} contacts from this account to the selected play.</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px">${plays.map(p => `<span class="tag tag-pink" onclick="addAccountToPlay('${aid}','${p.id}');closeModal()" style="cursor:pointer;padding:8px 12px">${p.icon} ${p.name}</span>`).join('')}</div>
    </div></div>`;
}

function showPlayModal() {
    window.tempSteps = [];
    document.getElementById('modalBox').innerHTML = `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><span class="modal-title">New Play</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="playName"></div>
        <div class="form-group"><label class="form-label">Icon</label><input class="form-input" id="playIcon" placeholder="🎯" style="width:80px"></div>
        <div class="form-group"><label class="form-label">Color</label><input class="form-input" id="playColor" type="color" value="#ff6bd6" style="width:80px"></div>
        <div class="form-group"><label class="form-label">Steps</label><div id="playSteps"></div><button class="btn btn-sm btn-ghost mt-2" onclick="window.tempSteps.push({d:window.tempSteps.length+1,t:'Call'});renderPlaySteps()">+ Add Step</button></div>
        <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewPlay()">Create</button></div>
    </div></div>`;
    window.tempSteps.push({d:1,t:'Call'}); renderPlaySteps();
}

function renderPlaySteps() {
    document.getElementById('playSteps').innerHTML = window.tempSteps.map((s, i) => `<div class="settings-row">
        <span style="width:30px">${i+1}</span>
        <select class="form-select" style="width:100px" onchange="window.tempSteps[${i}].t=this.value"><option ${s.t==='Call'?'selected':''}>Call</option><option ${s.t==='Email'?'selected':''}>Email</option><option ${s.t==='LinkedIn'?'selected':''}>LinkedIn</option></select>
        <span class="text-muted">Day</span><input class="form-input" style="width:60px" type="number" value="${s.d}" onchange="window.tempSteps[${i}].d=parseInt(this.value)">
        <button class="btn btn-sm btn-ghost" onclick="window.tempSteps.splice(${i},1);renderPlaySteps()">×</button></div>`).join('');
}

function saveNewPlay() {
    const name = document.getElementById('playName').value.trim();
    if (!name || !window.tempSteps.length) return alert('Name and steps required');
    S.plays.push({ id: genId(), name, icon: document.getElementById('playIcon').value || '🎯', color: document.getElementById('playColor').value, steps: [...window.tempSteps] });
    save('plays'); closeModal(); render();
}

function editPlay(id) {
    const p = getPlay(id);
    if (!p || p.isMain) return;
    window.tempSteps = [...p.steps];
    document.getElementById('modalBox').innerHTML = `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><span class="modal-title">Edit Play</span><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="editPlayName" value="${p.name}"></div>
        <div class="form-group"><label class="form-label">Icon</label><input class="form-input" id="editPlayIcon" value="${p.icon}" style="width:80px"></div>
        <div class="form-group"><label class="form-label">Color</label><input class="form-input" id="editPlayColor" type="color" value="${p.color}" style="width:80px"></div>
        <div class="form-group"><label class="form-label">Steps</label><div id="playSteps"></div><button class="btn btn-sm btn-ghost mt-2" onclick="window.tempSteps.push({d:window.tempSteps.length+1,t:'Call'});renderPlaySteps()">+ Add Step</button></div>
        <div class="modal-actions"><button class="btn btn-danger" onclick="deletePlay('${id}')">Delete</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEditPlay('${id}')">Save</button></div>
    </div></div>`;
    renderPlaySteps();
}

function saveEditPlay(id) {
    const p = getPlay(id);
    if (p) {
        p.name = document.getElementById('editPlayName').value.trim();
        p.icon = document.getElementById('editPlayIcon').value;
        p.color = document.getElementById('editPlayColor').value;
        p.steps = [...window.tempSteps];
        save('plays'); closeModal(); render();
    }
}

function deletePlay(id) { 
    if (confirm('Delete play?')) { 
        S.plays = S.plays.filter(p => p.id !== id); 
        S.contacts.forEach(c => { if (c.plays) c.plays = c.plays.filter(p => p !== id); });
        save('plays'); save('contacts'); closeModal(); render(); 
    } 
}

// ========== INIT ==========
render();
</script>
</body>
</html>
